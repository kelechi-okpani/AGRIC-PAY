services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: odu-app

    ports:
      - "4000:4000"

    env_file:
      - .env

    depends_on:
      - mongo
      - redis

    restart: unless-stopped

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - NODE_ENV=development

  mongo:
    image: mongo:7
    container_name: odu-mongo
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: odu-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: